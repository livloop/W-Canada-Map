name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Guard: no em/en dashes may ship in the site text (only normal hyphens).
      - name: Lint - no em/en dashes
        run: python3 check_dashes.py

      - name: Configure Pages
        # enablement: true turns on GitHub Pages (source = Actions) automatically.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        # The site is static at the repo root; upload it as-is.
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
